<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather App | Muhammad Hasnain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main Weather Card */
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        /* Header */
        .app-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .app-header h1 {
            color: #333;
            font-size: 1.8rem;
        }

        .developer-name {
            color: #667eea;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #cityInput {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        #cityInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #searchBtn {
            padding: 14px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        #searchBtn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        /* Current Weather */
        .current-weather {
            text-align: center;
            margin-bottom: 25px;
        }

        .city-name {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .country {
            color: #667eea;
            font-size: 0.9rem;
        }

        .temperature {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }

        .weather-condition {
            font-size: 1.2rem;
            color: #666;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .weather-icon {
            width: 50px;
            height: 50px;
        }

        /* Weather Details Grid */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .detail-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
        }

        .detail-card:hover {
            transform: scale(1.02);
        }

        .detail-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .detail-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }

        /* Forecast Section */
        .forecast-section {
            margin-top: 25px;
        }

        .forecast-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .forecast-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day {
            font-size: 0.7rem;
            font-weight: bold;
            color: #667eea;
        }

        .forecast-icon {
            width: 35px;
            height: 35px;
            margin: 5px 0;
        }

        .forecast-temp {
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1rem;
        }

        .error-message {
            background: #ffe0e0;
            color: #ff4757;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: white;
            font-size: 0.8rem;
        }

        footer .name {
            font-weight: bold;
            color: #ffd700;
        }

        /* Recent Cities */
        .recent-cities {
            margin-top: 20px;
        }

        .recent-title {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        .recent-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recent-btn {
            background: #e0e0e0;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recent-btn:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 500px) {
            .weather-card {
                padding: 20px;
            }

            .forecast-grid {
                gap: 5px;
            }

            .forecast-item {
                padding: 5px;
            }

            .temperature {
                font-size: 3rem;
            }

            .city-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="app-header">
                <h1>🌤️ Advanced Weather App</h1>
                <div class="developer-name">Created by Muhammad Hasnain</div>
            </div>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." value="Karachi">
                <button id="searchBtn">🔍 Search</button>
            </div>

            <div id="weatherContent">
                <div class="loading">Loading weather data...</div>
            </div>

            <div class="recent-cities" id="recentCities" style="display: none;">
                <div class="recent-title">📌 Recently Searched:</div>
                <div class="recent-buttons" id="recentButtons"></div>
            </div>
        </div>

        <footer>
            Developed with ❤️ by <span class="name">Muhammad Hasnain</span> | Real-time Weather & 5-Day Forecast
        </footer>
    </div>

    <script>
        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
        let recentCities = [];

        function loadRecentCities() {
            const saved = localStorage.getItem('hasnain_recent_cities');
            if (saved) {
                recentCities = JSON.parse(saved);
                updateRecentButtons();
            }
        }

        function saveRecentCity(city) {
            // Remove if exists
            recentCities = recentCities.filter(c => c.toLowerCase() !== city.toLowerCase());
            // Add to beginning
            recentCities.unshift(city);
            // Keep only last 5
            recentCities = recentCities.slice(0, 5);
            localStorage.setItem('hasnain_recent_cities', JSON.stringify(recentCities));
            updateRecentButtons();
        }

        function updateRecentButtons() {
            const container = document.getElementById('recentButtons');
            const recentSection = document.getElementById('recentCities');
            
            if (recentCities.length > 0) {
                recentSection.style.display = 'block';
                container.innerHTML = recentCities.map(city => 
                    `<button class="recent-btn" onclick="searchCity('${city}')">${city}</button>`
                ).join('');
            } else {
                recentSection.style.display = 'none';
            }
        }

        function searchCity(city) {
            document.getElementById('cityInput').value = city;
            getWeatherData(city);
        }

        async function getWeatherData(city) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading">🌍 Fetching weather data...</div>';

            try {
                // Current weather
                const currentUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
                const currentResponse = await fetch(currentUrl);
                
                if (!currentResponse.ok) {
                    throw new Error('City not found');
                }
                
                const currentData = await currentResponse.json();
                
                // 5-day forecast
                const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`;
                const forecastResponse = await fetch(forecastUrl);
                const forecastData = await forecastResponse.json();
                
                displayWeather(currentData, forecastData);
                saveRecentCity(city);
                
            } catch (error) {
                weatherContent.innerHTML = `
                    <div class="error-message">
                        ❌ ${error.message}. Please check the city name and try again!
                    </div>
                `;
            }
        }

        function displayWeather(current, forecast) {
            const weatherContent = document.getElementById('weatherContent');
            
            // Get daily forecast (one per day, noon time)
            const dailyForecasts = [];
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            for (let i = 0; i < forecast.list.length; i++) {
                const item = forecast.list[i];
                const date = new Date(item.dt * 1000);
                const hour = date.getHours();
                
                // Take forecast for around noon (11 AM - 2 PM)
                if (hour >= 11 && hour <= 14) {
                    if (dailyForecasts.length < 5) {
                        dailyForecasts.push(item);
                    }
                }
            }
            
            // If we don't have enough forecasts, take first 5
            while (dailyForecasts.length < 5 && forecast.list.length > 0) {
                dailyForecasts.push(forecast.list[dailyForecasts.length]);
            }
            
            weatherContent.innerHTML = `
                <div class="current-weather">
                    <h2 class="city-name">${current.name}</h2>
                    <div class="country">${current.sys.country}</div>
                    <div class="temperature">${Math.round(current.main.temp)}°C</div>
                    <div class="weather-condition">
                        <img class="weather-icon" src="https://openweathermap.org/img/w/${current.weather[0].icon}.png" alt="weather icon">
                        ${current.weather[0].description}
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value">${Math.round(current.main.feels_like)}°C</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">${current.main.humidity}%</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value">${current.wind.speed} km/h</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">📊</div>
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">${current.main.pressure} hPa</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">👁️</div>
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value">${(current.visibility / 1000).toFixed(1)} km</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">🌅</div>
                        <div class="detail-label">Sunrise/Sunset</div>
                        <div class="detail-value">
                            ${new Date(current.sys.sunrise * 1000).toLocaleTimeString()} / 
                            ${new Date(current.sys.sunset * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                </div>
                
                <div class="forecast-section">
                    <div class="forecast-title">📅 5-Day Forecast</div>
                    <div class="forecast-grid">
                        ${dailyForecasts.map((day, index) => {
                            const date = new Date(day.dt * 1000);
                            const dayName = days[date.getDay()];
                            return `
                                <div class="forecast-item">
                                    <div class="forecast-day">${dayName}</div>
                                    <img class="forecast-icon" src="https://openweathermap.org/img/w/${day.weather[0].icon}.png" alt="weather">
                                    <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
                                    <div style="font-size:0.65rem;color:#666;">${day.weather[0].description.substring(0, 10)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // Event Listeners
        document.getElementById('searchBtn').addEventListener('click', () => {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                getWeatherData(city);
            }
        });

        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = document.getElementById('cityInput').value.trim();
                if (city) {
                    getWeatherData(city);
                }
            }
        });

        // Load default city and recent cities
        loadRecentCities();
        getWeatherData('Karachi');
    </script>
</body>
</html>
